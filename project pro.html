<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Repo Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-bold text-blue-400 mb-2">🚀 GitHub Repository Explorer</h1>
            <p class="text-gray-400">Enter a username to analyze their public portfolio</p>
        </header>

        <div class="bg-gray-800 p-6 rounded-xl shadow-lg mb-8 flex flex-wrap gap-4 items-end">
            <div class="flex-1 min-w-[200px]">
                <label class="block text-sm font-medium mb-2">GitHub Username</label>
                <input type="text" id="username" placeholder="e.g. octocat" 
                       class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div class="flex-1 min-w-[200px]">
                <label class="block text-sm font-medium mb-2">Token (Optional)</label>
                <input type="password" id="token" placeholder="Personal Access Token" 
                       class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <button onclick="fetchData()" id="btn" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-6 rounded-lg transition">
                Explore
            </button>
        </div>

        <div id="stats" class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8 hidden">
            <div class="bg-gray-800 p-4 rounded-lg border-l-4 border-blue-500 text-center">
                <p class="text-gray-400 text-sm">Total Repos</p>
                <p id="stat-repos" class="text-2xl font-bold">-</p>
            </div>
            <div class="bg-gray-800 p-4 rounded-lg border-l-4 border-yellow-500 text-center">
                <p class="text-gray-400 text-sm">Total Stars</p>
                <p id="stat-stars" class="text-2xl font-bold">-</p>
            </div>
            <div class="bg-gray-800 p-4 rounded-lg border-l-4 border-green-500 text-center">
                <p class="text-gray-400 text-sm">Total Forks</p>
                <p id="stat-forks" class="text-2xl font-bold">-</p>
            </div>
            <div class="bg-gray-800 p-4 rounded-lg border-l-4 border-purple-500 text-center">
                <p class="text-gray-400 text-sm">Top Language</p>
                <p id="stat-lang" class="text-2xl font-bold">-</p>
            </div>
        </div>

        <div id="charts-row" class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8 hidden">
            <div class="bg-gray-800 p-6 rounded-xl">
                <h3 class="text-lg font-semibold mb-4 text-center">Language Distribution</h3>
                <canvas id="langChart"></canvas>
            </div>
            <div class="bg-gray-800 p-6 rounded-xl">
                <h3 class="text-lg font-semibold mb-4 text-center">Top 10 Starred Repos</h3>
                <canvas id="starChart"></canvas>
            </div>
        </div>

        <div id="table-container" class="bg-gray-800 rounded-xl overflow-hidden hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-700">
                    <tr>
                        <th class="p-4">Repository</th>
                        <th class="p-4">Language</th>
                        <th class="p-4">Stars</th>
                        <th class="p-4">Link</th>
                    </tr>
                </thead>
                <tbody id="repo-table-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        let langChartInstance = null;
        let starChartInstance = null;

        async function fetchData() {
            const user = document.getElementById('username').value;
            const token = document.getElementById('token').value;
            const btn = document.getElementById('btn');
            
            if (!user) return alert("Please enter a username");

            btn.innerText = "Loading...";
            btn.disabled = true;

            const headers = { 'Accept': 'application/vnd.github.v3+json' };
            if (token) headers['Authorization'] = `token ${token}`;

            try {
                const response = await fetch(`https://api.github.com/users/${user}/repos?per_page=100`, { headers });
                if (!response.ok) throw new Error("User not found");
                
                const repos = await response.json();
                processData(repos);
                
                // Show hidden sections
                document.getElementById('stats').classList.remove('hidden');
                document.getElementById('charts-row').classList.remove('hidden');
                document.getElementById('table-container').classList.remove('hidden');
            } catch (err) {
                alert(err.message);
            } finally {
                btn.innerText = "Explore";
                btn.disabled = false;
            }
        }

        function processData(repos) {
            // Stats
            const totalStars = repos.reduce((sum, r) => sum + r.stargazers_count, 0);
            const totalForks = repos.reduce((sum, r) => sum + r.forks_count, 0);
            
            const languages = {};
            repos.forEach(r => {
                if (r.language) languages[r.language] = (languages[r.language] || 0) + 1;
            });
            const topLang = Object.keys(languages).reduce((a, b) => languages[a] > languages[b] ? a : b, "N/A");

            document.getElementById('stat-repos').innerText = repos.length;
            document.getElementById('stat-stars').innerText = totalStars;
            document.getElementById('stat-forks').innerText = totalForks;
            document.getElementById('stat-lang').innerText = topLang;

            // Table
            const tbody = document.getElementById('repo-table-body');
            tbody.innerHTML = repos.slice(0, 15).map(r => `
                <tr class="border-t border-gray-700 hover:bg-gray-750 transition">
                    <td class="p-4 font-semibold text-blue-300">${r.name}</td>
                    <td class="p-4">${r.language || 'N/A'}</td>
                    <td class="p-4 text-yellow-400">⭐ ${r.stargazers_count}</td>
                    <td class="p-4"><a href="${r.html_url}" target="_blank" class="text-blue-500 underline">View</a></td>
                </tr>
            `).join('');

            // Charts
            renderCharts(languages, repos);
        }

        function renderCharts(langData, repos) {
            // Destroy old charts if they exist
            if (langChartInstance) langChartInstance.destroy();
            if (starChartInstance) starChartInstance.destroy();

            // Language Pie Chart
            langChartInstance = new Chart(document.getElementById('langChart'), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(langData),
                    datasets: [{
                        data: Object.values(langData),
                        backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ef4444']
                    }]
                },
                options: { plugins: { legend: { labels: { color: '#fff' } } } }
            });

            // Star Bar Chart
            const top10 = repos.sort((a, b) => b.stargazers_count - a.stargazers_count).slice(0, 10);
            starChartInstance = new Chart(document.getElementById('starChart'), {
                type: 'bar',
                data: {
                    labels: top10.map(r => r.name),
                    datasets: [{
                        label: 'Stars',
                        data: top10.map(r => r.stargazers_count),
                        backgroundColor: '#f59e0b'
                    }]
                },
                options: { 
                    scales: { 
                        y: { ticks: { color: '#fff' } },
                        x: { ticks: { color: '#fff' } }
                    }
                }
            });
        }
    </script>
</body>
</html>
